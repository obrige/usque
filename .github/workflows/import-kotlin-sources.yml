name: Import Missing Kotlin Sources
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Download and place Kotlin files
        run: |
          set -ex
          BASE="https://raw.githubusercontent.com/obrige/usque-android/160bc27"
          DST="android/usque-vpn/app/src/main/kotlin/com/abobo/usque"
          mkdir -p "$DST"
          wget -q "$BASE/$DST/MainActivity.kt" -O "$DST/MainActivity.kt"
          wget -q "$BASE/$DST/UsqueVpnService.kt" -O "$DST/UsqueVpnService.kt"
          echo "=== Files ==="
          ls -la "$DST/"
          wc -l "$DST/"*.kt
          head -3 "$DST/MainActivity.kt"

      - name: Commit and push
        run: |
          set -ex
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git status
          git diff --cached --stat
          git commit -m "fix: import Kotlin sources (MainActivity + UsqueVpnService)"
          git push origin main
