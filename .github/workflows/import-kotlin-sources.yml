name: Import Missing Kotlin Sources
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Download Kotlin source files
        run: |
          BASE="https://raw.githubusercontent.com/obrige/usque-android/160bc27"
          DIR="android/usque-vpn/app/src/main/kotlin/com/abobo/usque"
          mkdir -p "$DIR"
          curl -sL "$BASE/$DIR/MainActivity.kt" -o "$DIR/MainActivity.kt"
          curl -sL "$BASE/$DIR/UsqueVpnService.kt" -o "$DIR/UsqueVpnService.kt"
          echo "=== Downloaded files ==="
          ls -la "$DIR/"
          wc -l "$DIR/"*.kt

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git status
          git diff --staged --stat
          git commit -m "fix: import missing Kotlin sources from original repo"
          git push
