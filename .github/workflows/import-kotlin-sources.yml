name: Import Missing Kotlin Sources
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone original repo at commit 160bc27
        run: |
          git clone https://github.com/obrige/usque-android.git /tmp/original
          cd /tmp/original
          git checkout 160bc27
          ls -la android/usque-vpn/app/src/main/kotlin/com/abobo/usque/

      - name: Copy missing Kotlin sources
        run: |
          mkdir -p android/usque-vpn/app/src/main/kotlin/com/abobo/usque
          cp /tmp/original/android/usque-vpn/app/src/main/kotlin/com/abobo/usque/*.kt android/usque-vpn/app/src/main/kotlin/com/abobo/usque/
          ls -la android/usque-vpn/app/src/main/kotlin/com/abobo/usque/

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "fix: import missing Kotlin sources from original repo"
          git push
