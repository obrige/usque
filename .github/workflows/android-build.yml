name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix module path
        run: |
          sed -i 's|github.com/obrige/usque-android|github.com/obrige/usque|g' go.mod
          find . -name '*.go' -exec sed -i 's|github.com/obrige/usque-android|github.com/obrige/usque|g' {} +
          cat go.mod | head -3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build AAR
        run: |
          mkdir -p android/usque-vpn/app/libs
          gomobile bind -v -target=android/arm64,android/arm -androidapi 24 \
            -ldflags="-s -w" -o android/usque-vpn/app/libs/usque.aar \
            github.com/obrige/usque/android

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          sudo unzip -q -d /opt /tmp/gradle.zip
          echo "/opt/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build APK
        working-directory: android/usque-vpn
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: usque-vpn-debug
          path: android/usque-vpn/app/build/outputs/apk/debug/app-debug.apk
