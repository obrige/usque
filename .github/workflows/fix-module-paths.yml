name: Fix Module Paths
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace all usque-android references
        run: |
          sed -i 's|github.com/obrige/usque-android|github.com/obrige/usque|g' go.mod
          find . -name '*.go' -exec sed -i 's|github.com/obrige/usque-android|github.com/obrige/usque|g' {} +

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "fix: replace usque-android → usque in all module references"
          git push
